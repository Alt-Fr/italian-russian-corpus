version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:123@db:5432/rus_it

  db:
    image: postgres:12
    environment:
      POSTGRES_DB: rus_it
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"

volumes:
  db_data:

